<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 160" width="200" height="160">
  <defs>
    <style>
      .icon { fill: #1a5276; }
      .bg   { fill: #f0f4f8; }
    </style>
  </defs>

  <!-- ── Passport photo frame ── -->
  <rect x="20" y="10" width="100" height="125" rx="4" ry="4" class="icon" />
  <rect x="27" y="17" width="86" height="111" rx="2" ry="2" class="bg" />

  <!-- ── Person silhouette ── -->
  <!-- Head -->
  <circle cx="70" cy="55" r="22" class="icon" />
  <!-- Neck + shoulders -->
  <path d="M30 128 Q30 88 70 88 Q110 88 110 128 Z" class="icon" />

  <!-- ── Scissors ── -->
  <!-- Blade 1 (top-right diagonal) -->
  <line x1="108" y1="95" x2="175" y2="30" stroke="#1a5276" stroke-width="11" stroke-linecap="round" />
  <!-- Blade 2 (lower-right diagonal) -->
  <line x1="108" y1="95" x2="190" y2="115" stroke="#1a5276" stroke-width="11" stroke-linecap="round" />

  <!-- Pivot screw -->
  <circle cx="108" cy="95" r="8" class="icon" />
  <circle cx="108" cy="95" r="4" class="bg" />

  <!-- Handle ring 1 (upper) -->
  <circle cx="168" cy="150" r="16" fill="none" stroke="#1a5276" stroke-width="10" />
  <!-- Shank connecting blade1 to ring1 -->
  <line x1="108" y1="95" x2="157" y2="140" stroke="#1a5276" stroke-width="11" stroke-linecap="round" />

  <!-- Handle ring 2 (lower-right) -->
  <circle cx="192" cy="45" r="16" fill="none" stroke="#1a5276" stroke-width="10" />
  <!-- Shank connecting blade2 to ring2 -->
  <line x1="108" y1="95" x2="181" y2="55" stroke="#1a5276" stroke-width="11" stroke-linecap="round" />
</svg>
