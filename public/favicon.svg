<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e40af;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="64" height="64" rx="14" ry="14" fill="url(#bg)" />
  <!-- Camera body -->
  <rect x="10" y="22" width="44" height="30" rx="5" ry="5" fill="white" opacity="0.95" />
  <!-- Camera lens outer -->
  <circle cx="32" cy="37" r="10" fill="#1e40af" />
  <!-- Camera lens inner -->
  <circle cx="32" cy="37" r="7" fill="#93c5fd" />
  <!-- Camera lens highlight -->
  <circle cx="32" cy="37" r="4" fill="white" opacity="0.8" />
  <!-- Camera viewfinder notch -->
  <path d="M24 22 L28 15 L36 15 L40 22 Z" fill="white" opacity="0.95" />
  <!-- Camera flash dot -->
  <circle cx="48" cy="27" r="3" fill="#fbbf24" />
  <!-- S letter for Satya -->
  <text x="32" y="41" font-family="Arial, sans-serif" font-size="8" font-weight="900"
        text-anchor="middle" fill="#1e40af" dominant-baseline="middle">S</text>
</svg>
