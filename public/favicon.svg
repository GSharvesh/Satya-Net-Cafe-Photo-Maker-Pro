<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8eef5" />
      <stop offset="100%" style="stop-color:#d0dce8" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="64" height="64" rx="10" ry="10" fill="url(#bg)" />

  <!-- Photo frame -->
  <rect x="6" y="4" width="36" height="38" rx="2" ry="2"
        fill="none" stroke="#1e4d7b" stroke-width="3.5" />

  <!-- Person head -->
  <ellipse cx="24" cy="17" rx="8" ry="9" fill="#1e4d7b" />
  <!-- Face cutout -->
  <ellipse cx="24" cy="16" rx="5" ry="6" fill="#e8eef5" />
  <!-- Neck cutout -->
  <rect x="21" y="23" width="6" height="4" fill="#e8eef5" />
  <!-- Body -->
  <path d="M6 42 Q6 30 24 30 Q42 30 42 42 Z" fill="#1e4d7b" />

  <!-- Scissors pivot -->
  <circle cx="40" cy="34" r="3" fill="#1e4d7b" />
  <circle cx="40" cy="34" r="1.5" fill="#e8eef5" />

  <!-- Blade upper -->
  <line x1="40" y1="34" x2="58" y2="18" stroke="#1e4d7b" stroke-width="3.5" stroke-linecap="round" />
  <!-- Blade lower -->
  <line x1="40" y1="34" x2="58" y2="46" stroke="#1e4d7b" stroke-width="3.5" stroke-linecap="round" />

  <!-- Handle 1 shank + ring -->
  <line x1="40" y1="34" x2="32" y2="46" stroke="#1e4d7b" stroke-width="3.5" stroke-linecap="round" />
  <circle cx="29" cy="52" r="6" fill="none" stroke="#1e4d7b" stroke-width="3.5" />

  <!-- Handle 2 shank + ring -->
  <line x1="40" y1="34" x2="52" y2="38" stroke="#1e4d7b" stroke-width="3.5" stroke-linecap="round" />
  <circle cx="57" cy="40" r="5" fill="none" stroke="#1e4d7b" stroke-width="3.5" />
</svg>
